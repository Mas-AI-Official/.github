name: Feature request
description: Propose a scoped improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What user or operator workflow should improve?
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Security, compatibility, data, deployment, or UX constraints.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should we verify this is done?
    validations:
      required: true
